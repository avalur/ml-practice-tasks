name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check tasks/ is generated from problems/
        run: python generate.py --check
      - name: Check web content is generated from problems/
        run: python export_web.py --check
      - name: Run reference solutions
        run: pytest problems -q

  web:
    runs-on: ubuntu-latest
    needs: python
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e (in-browser Pyodide runner)
        run: pnpm exec playwright test
