[pytest]
pythonpath = .
testpaths = problems
# Each problem's test file is named `test.py`, which pytest's default
# python_files glob (test_*.py / *_test.py) does NOT match — so collecting a
# directory would silently run zero tests. Add `test.py` explicitly.
python_files = test.py test_*.py *_test.py
# Every problem's test file is named test.py; without packages that collides
# under the default prepend import mode. importlib mode keys modules by path.
addopts = --import-mode=importlib
